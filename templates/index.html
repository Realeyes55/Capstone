<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Summarizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header__badge">Powered by Groq</div>
      <h1>Text Summarizer</h1>
      <p class="header__subtitle">Upload a plain text file and get an AI-generated summary in seconds.</p>
    </header>

    <main class="main">
      <section class="upload-section">
        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload a text file">
          <div class="dropzone__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 16V4m0 0L8 8m4-4 4 4"/>
              <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
            </svg>
          </div>
          <p class="dropzone__title">Drop your .txt file here</p>
          <p class="dropzone__hint">or click to browse — max 2 MB</p>
          <input type="file" id="file-input" accept=".txt,text/plain" hidden>
        </div>

        <div id="file-info" class="file-info hidden">
          <span id="file-name" class="file-info__name"></span>
          <button type="button" id="clear-btn" class="file-info__clear">Remove</button>
        </div>

        <button type="button" id="summarize-btn" class="btn btn--primary" disabled>
          Summarize
        </button>
      </section>

      <div id="alert" class="alert hidden" role="alert"></div>

      <div id="loading" class="loading hidden" aria-live="polite">
        <div class="loading__spinner"></div>
        <p>Generating summary…</p>
      </div>

      <section id="results" class="results hidden">
        <article class="panel">
          <div class="panel__header">
            <h2>Original Content</h2>
            <span id="result-filename" class="panel__tag"></span>
          </div>
          <pre id="original-content" class="panel__body"></pre>
        </article>

        <article class="panel panel--accent">
          <div class="panel__header">
            <h2>Summary</h2>
          </div>
          <div id="summary-content" class="panel__body panel__body--prose"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
